<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Smart Mobility Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container" style="max-width: 420px; margin-top: 80px;">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Smart Mobility Insights</h3>
                <h5 class="text-center text-muted mb-4">Create Account</h5>
                <form method="post">
                    {% csrf_token %}
                    {% if form.non_field_errors %}
                        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                    {% endif %}
                    <div class="mb-3">{{ form.username }}</div>
                    <div class="mb-3">{{ form.email }}</div>
                    <div class="mb-3">{{ form.password }}</div>
                    <div class="mb-3">{{ form.confirm_password }}</div>
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
                <p class="text-center mt-3">
                    Already have an account? <a href="{% url 'login' %}">Login</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>

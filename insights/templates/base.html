<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Mobility Insights{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    {% block extra_head %}{% endblock %}
    <style>
        body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="/">🚗 Smart Mobility</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Map</a>
            <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
            {% if user.is_staff %}
                <a class="nav-link" href="{% url 'admin_dashboard' %}">Admin</a>
            {% endif %}
            <span class="nav-link text-light-emphasis">{{ user.username }}</span>
            <a class="nav-link" href="{% url 'logout' %}">Logout</a>
        </div>
    </nav>
    <main>{% block content %}{% endblock %}</main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>

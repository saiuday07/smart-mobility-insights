{% extends "base.html" %}
{% block title %}Route Planner — Smart Mobility{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
html, body, #map { height: 100%; margin: 0; }
.navbar { position: relative; z-index: 1000; }
#sidebar {
    position: absolute; top: 56px; left: 0; width: 380px; height: calc(100% - 56px);
    background: white; z-index: 500; overflow-y: auto; padding: 16px;
    box-shadow: 2px 0 8px rgba(0,0,0,0.1);
}
#map { margin-left: 380px; height: calc(100vh - 56px); }
.route-card {
    border: 1px solid #dee2e6; border-radius: 8px; padding: 12px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s;
}
.route-card:hover { border-color: #0d6efd; background: #f0f7ff; }
.route-card.recommended { border-color: #198754; background: #f0fff4; }
.route-card .label { font-size: 12px; color: #6c757d; }
.route-card .value { font-size: 16px; font-weight: 600; }
.traffic-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
</style>
{% endblock %}
{% block content %}
<div id="sidebar">
    <h5 class="mb-3">Route Planner</h5>
    <div class="mb-2">
        <label class="form-label small">Origin</label>
        <input id="origin-input" class="form-control form-control-sm" placeholder="e.g. Hitech City, Hyderabad" autocomplete="off">
        <div id="origin-suggestions" class="suggestions-box"></div>
    </div>
    <div class="mb-2">
        <label class="form-label small">Destination</label>
        <input id="dest-input" class="form-control form-control-sm" placeholder="e.g. Hyderabad Airport" autocomplete="off">
        <div id="dest-suggestions" class="suggestions-box"></div>
    </div>
    <div class="mb-3">
        <label class="form-label small">Vehicle</label>
        <select id="vehicle-select" class="form-select form-select-sm">
            <option value="car">Car</option>
            <option value="bike">Bike</option>
            <option value="bus">Bus</option>
            <option value="truck">Truck</option>
            <option value="ambulance">Ambulance</option>
        </select>
    </div>
    <button id="find-route-btn" class="btn btn-primary w-100 mb-3">Find Route</button>

    <div id="results" style="display:none;">
        <h6 class="border-bottom pb-2 mb-3">Route Options</h6>
        <div id="routes-container"></div>
        <div class="mt-3 small">
            <strong>Traffic Legend:</strong><br>
            <span class="traffic-dot" style="background:#28a745;"></span> Light
            <span class="traffic-dot" style="background:#ffc107;"></span> Moderate
            <span class="traffic-dot" style="background:#fd7e14;"></span> Heavy
            <span class="traffic-dot" style="background:#dc3545;"></span> Congested
        </div>
    </div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CSRF_TOKEN = "{{ csrf_token }}";

// Map
const map = L.map('map').setView([17.4435, 78.3772], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

let routeLayers = [];
let markers = [];

function getSuggestions(input, target) {
    const val = input.value.trim();
    if (val.length < 3) { document.getElementById(target).innerHTML = ''; return; }
    fetch(`/api/geocode/?q=${encodeURIComponent(val)}`)
        .then(r => r.json())
        .then(data => {
            const box = document.getElementById(target);
            if (!Array.isArray(data)) { box.innerHTML = ''; return; }
            box.innerHTML = data.map(p =>
                `<div class="suggestion-item" data-lat="${p.lat}" data-lng="${p.lng}" data-name="${p.display_name}">${p.display_name}</div>`
            ).join('');
            box.querySelectorAll('.suggestion-item').forEach(el => {
                el.addEventListener('click', () => {
                    input.value = el.dataset.name;
                    input.dataset.lat = el.dataset.lat;
                    input.dataset.lng = el.dataset.lng;
                    box.innerHTML = '';
                });
            });
        }).catch(() => {});
}

document.getElementById('origin-input').addEventListener('input', function() {
    getSuggestions(this, 'origin-suggestions');
});
document.getElementById('dest-input').addEventListener('input', function() {
    getSuggestions(this, 'dest-suggestions');
});

document.getElementById('find-route-btn').addEventListener('click', findRoute);
document.addEventListener('keydown', e => { if (e.key === 'Enter') findRoute(); });

function findRoute() {
    const origin = document.getElementById('origin-input');
    const dest = document.getElementById('dest-input');
    const vehicle = document.getElementById('vehicle-select').value;

    if (!origin.dataset.lat || !dest.dataset.lat) {
        alert('Please select locations from suggestions');
        return;
    }

    // Clear previous
    routeLayers.forEach(l => map.removeLayer(l));
    routeLayers = [];
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    fetch('/api/route/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN},
        body: JSON.stringify({
            origin_lat: parseFloat(origin.dataset.lat),
            origin_lng: parseFloat(origin.dataset.lng),
            dest_lat: parseFloat(dest.dataset.lat),
            dest_lng: parseFloat(dest.dataset.lng),
            origin_name: origin.value,
            dest_name: dest.value,
            vehicle: vehicle,
        })
    })
    .then(r => r.json())
    .then(data => {
        const container = document.getElementById('routes-container');
        container.innerHTML = '';
        document.getElementById('results').style.display = 'block';

        if (!data.routes || data.routes.length === 0) {
            container.innerHTML = '<div class="text-danger">No route found</div>';
            return;
        }

        const trafficColors = {light: '#28a745', moderate: '#ffc107', heavy: '#fd7e14', congested: '#dc3545'};
        const trafficLabels = {light: 'Light', moderate: 'Moderate', heavy: 'Heavy', congested: 'Congested'};

        data.routes.forEach((route, idx) => {
            const color = trafficColors[route.traffic.level] || '#28a745';
            const level = route.traffic.level || 'light';

            // Draw on map
            try {
                const polyline = L.geoJSON(route.geometry, {
                    style: {color, weight: idx === 0 ? 6 : 4, opacity: 0.8}
                }).addTo(map);
                routeLayers.push(polyline);
            } catch(e) {}

            // Card
            const card = document.createElement('div');
            card.className = `route-card${route.recommended ? ' recommended' : ''}`;
            card.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <strong>${route.recommended ? '🏆 Route ' + (idx+1) : 'Route ' + (idx+1)}</strong>
                    <span><span class="traffic-dot" style="background:${color}"></span>${trafficLabels[level]}</span>
                </div>
                <div class="row mt-2">
                    <div class="col-4"><span class="label">Distance</span><div class="value">${route.distance_km} km</div></div>
                    <div class="col-4"><span class="label">ETA</span><div class="value">${route.adjusted_duration_min} min</div></div>
                    <div class="col-4"><span class="label">Toll</span><div class="value">₹${route.toll || 'N/A'}</div></div>
                </div>
                <div class="mt-1"><span class="label">Pricing:</span> ${route.pricing_model || 'N/A'}</div>
            `;
            card.addEventListener('click', () => {
                map.fitBounds(routeLayers[idx].getBounds());
            });
            container.appendChild(card);
        });

        // Fit map to all routes
        if (routeLayers.length > 0) {
            try {
                const group = L.featureGroup(routeLayers);
                map.fitBounds(group.getBounds().pad(0.1));
            } catch(e) { /* ignore */ }
        }

        // Markers
        const o = L.marker([parseFloat(origin.dataset.lat), parseFloat(origin.dataset.lng)], {
            icon: L.divIcon({className: '', html: '<div style="background:#0d6efd;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;white-space:nowrap;">Origin</div>', iconSize: [50, 20], iconAnchor: [25, 10]})
        }).addTo(map);
        const d = L.marker([parseFloat(dest.dataset.lat), parseFloat(dest.dataset.lng)], {
            icon: L.divIcon({className: '', html: '<div style="background:#dc3545;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;white-space:nowrap;">Destination</div>', iconSize: [70, 20], iconAnchor: [35, 10]})
        }).addTo(map);
        markers = [o, d];
    })
    .catch(err => {
        alert('Route error: ' + err.message);
    });
}
</script>
<style>
.suggestions-box { position: absolute; z-index: 1000; background: white; border: 1px solid #ddd; max-height: 200px; overflow-y: auto; width: calc(100% - 16px); }
.suggestion-item { padding: 6px 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
.suggestion-item:hover { background: #e9ecef; }
#origin-suggestions, #dest-suggestions { position: relative; }
</style>
{% endblock %}
